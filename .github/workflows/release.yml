on:
  workflow_call:
    inputs:
      commit-sha:
        type: string
        required: true
      pr-number:
        type: string
        required: true
      labels:
        type: string
        required: true
      source-branch:
        type: string
        required: false
        default: master
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      merge-matrix: ${{ steps.parse.outputs.merge }}
      rebase-matrix: ${{ steps.parse.outputs.rebase }}
    steps:
      - name: Parse env labels into matrices
        id: parse
        run: |
          LABELS='${{ inputs.labels }}'
          MERGE_PREFIXES='${{ vars.MERGE_PREFIXES }}'
          REBASE_PREFIXES='${{ vars.REBASE_PREFIXES }}'
          MERGE=$(echo "$LABELS" | jq -c --argjson prefixes "$MERGE_PREFIXES" '
            [.[] | select(.name as $n | $prefixes | map(. as $p | $n | startswith($p)) | any) | .name | ltrimstr("env:")]
          ')
          REBASE=$(echo "$LABELS" | jq -c --argjson prefixes "$REBASE_PREFIXES" '
            [.[] | select(.name as $n | $prefixes | map(. as $p | $n | startswith($p)) | any) | .name | ltrimstr("env:")]
          ')
          echo "merge=$MERGE" >> $GITHUB_OUTPUT
          echo "rebase=$REBASE" >> $GITHUB_OUTPUT

  merge:
    needs: prepare
    if: needs.prepare.outputs.merge-matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.merge-matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge single commit into temp branch and open PR
        run: |
          TEMP_BRANCH="merge/${{ inputs.pr-number }}-into-${{ matrix.target }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout ${{ inputs.commit-sha }}
          git checkout -b $TEMP_BRANCH
          git merge origin/${{ matrix.target }} --no-edit
          git push origin $TEMP_BRANCH
          gh pr create \
            --title "Merge #${{ inputs.pr-number }} into ${{ matrix.target }}" \
            --body "Automated merge of #${{ inputs.pr-number }} into \`${{ matrix.target }}\`." \
            --base ${{ matrix.target }} \
            --head $TEMP_BRANCH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rebase:
    needs: prepare
    if: needs.prepare.outputs.rebase-matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.rebase-matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rebase target branch from source and open PR
        run: |
          TEMP_BRANCH="rebase/${{ inputs.pr-number }}-into-${{ matrix.target }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout ${{ matrix.target }}
          git checkout -b $TEMP_BRANCH
          git rebase origin/${{ inputs.source-branch }}
          git push origin $TEMP_BRANCH --force-with-lease
          gh pr create \
            --title "Rebase ${{ matrix.target }} from ${{ inputs.source-branch }} (#${{ inputs.pr-number }})" \
            --body "Automated rebase of \`${{ matrix.target }}\` from \`${{ inputs.source-branch }}\` triggered by #${{ inputs.pr-number }}." \
            --base ${{ matrix.target }} \
            --head $TEMP_BRANCH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
