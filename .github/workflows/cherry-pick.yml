on:
  workflow_call:
    inputs:
      commit-sha:
        type: string
        required: true
      pr-number:
        type: string
        required: true
      labels:
        type: string
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Parse env labels into matrix
        id: parse
        run: |
          MATRIX=$(echo '${{ inputs.labels }}' \
            | jq -c '[.[] | select(.name | startswith("env:")) | .name | ltrimstr("env:")]')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  cherry-pick:
    needs: prepare
    if: needs.prepare.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cherry-pick into temp branch and open PR
        run: |
          TEMP_BRANCH="cherry-pick/${{ inputs.pr-number }}-into-${{ matrix.target }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout ${{ matrix.target }}
          git checkout -b $TEMP_BRANCH
          git cherry-pick ${{ inputs.commit-sha }}
          git push origin $TEMP_BRANCH

          gh pr create \
            --title "Cherry-pick #${{ inputs.pr-number }} into ${{ matrix.target }}" \
            --body "Automated cherry-pick of #${{ inputs.pr-number }} into \`${{ matrix.target }}\`." \
            --base ${{ matrix.target }} \
            --head $TEMP_BRANCH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
